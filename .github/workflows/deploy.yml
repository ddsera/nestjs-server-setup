name: Deploy to Production
on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-folder
        path: dist/
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: Build
    environment: production
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-folder
        path: dist/

    - name: Setup SSH environment
      env:
        SSH_KEY: ${{ secrets.SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo -e "Host *\n\tStrictHostKeyChecking no" > ~/.ssh/config

    - name: Test SSH connection
      run: |
        ssh root@138.68.224.34 "echo 'Successfully connected to production server'"

    - name: Deploy application
      run: |
        # Create a tarball of the dist folder
        tar -czf dist.tar.gz dist/
        
        # Copy the tarball to the server
        scp dist.tar.gz deployer@138.68.224.34:/home/deployer/nestjs-server/nestjs-server-setup/
        
        # Extract and deploy on the server
        ssh deployer@138.68.224.34 "
          cd /home/deployer/nestjs-server/nestjs-server-setup
          echo 'Backing up current dist folder...'
          tar -czf dist-backup-$(date +%Y%m%d-%H%M%S).tar.gz dist/ 2>/dev/null || true
          echo 'Extracting new dist folder...'
          tar -xzf dist.tar.gz
          rm dist.tar.gz
          echo 'Installing production dependencies...'
          npm ci --only=production
          echo 'Restarting application...'
          pm2 restart main
          echo 'Deployment completed successfully!'
          rm -f *.tar
        "
